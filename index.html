      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          },
          animation: {
            'appear': 'appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'appear-zoom': 'appear-zoom 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'shimmer': 'shimmer 1.5s infinite linear',
          },
          keyframes: {
            appear: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'appear-zoom': {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            }
          }
        }
      }
    }
  </script>

      "g6": "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcnJ4cnFqczJwcjE4cmd4YnUwbTlmNjc5dDQ0cWxiMHNzcjhmZGVoMyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/2xD3RrcxB20kTDuWeY/giphy_s.gif",
      "crehabitat_thumb.jpg": "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExemgwZmJsNm5qc29qZnBrYnpiYWM0YXBoazc4YjhtejYwczI4bm82MyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/MbQPlY8F3nTuXldD4z/giphy_s.gif",
      "extintor_thumb.jpg": "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExOWJlNTdzbGw3Mjg4c2p6M3V0ZnJjcGtvZzk3ZTdvaDR6enY5eHQ1ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vEHJ3rEPheP5JjpktJ/giphy.gif",

      "https://url-falsa.com/juego2.png": "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExd2Q5MnNrY3Vxc3VkNGk3NXA5M21ubHhvbjJuazJ3enFqdHpuamNwcyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/f0Dy5NDc1jBzpcbff9/giphy_s.gif",
      "https://url-falsa.com/juego3.png": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExamdvNDV2b3J1Y3Q2OHNpd3A1MWV3NnVtbW14d2tveTllOTkyb2gyZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/e9BAkE9fnOEHgddk15/giphy_s.gif",
      // Mapeo por títulos por si acaso

      "Letras Locas": "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExd2Q5MnNrY3Vxc3VkNGk3NXA5M21ubHhvbjJuazJ3enFqdHpuamNwcyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/f0Dy5NDc1jBzpcbff9/giphy_s.gif",
      "Explorador de Ciencias": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExamdvNDV2b3J1Y3Q2OHNpd3A1MWV3NnVtbW14d2tveTllOTkyb2gyZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/e9BAkE9fnOEHgddk15/giphy_s.gif"
    };

    const getImageUrl = (imageVal, id, title, isHovered) => {
      let url = PREVIEW_IMAGES[imageVal] || PREVIEW_IMAGES[title] || PREVIEW_IMAGES[id] || imageVal;
      if (!url) return null;
      if (isHovered && url.includes('_s.gif')) {
        return url.replace('_s.gif', '.gif');
      }
      return url;
    };

    const parseApiResponsePayload = (rawData) => {
      if (Array.isArray(rawData)) return rawData;
      if (typeof rawData !== 'string') return [];

      const normalized = rawData.trim();
      const parsed = [];
      const markdownRegex = /(?:\d+)?titulo"([^"]+)"descripcion"([^"]+)"imagen"\[([^\]]+)\]\(([^\)]+)\)"/g;
      let match;
      while ((match = markdownRegex.exec(normalized)) !== null) {
        parsed.push({ titulo: match[1], descripcion: match[2], imagen: match[4] || match[3] });
      }

      if (parsed.length) return parsed;

      const fallbackRegex = /(?:\d+)?titulo"([^"]+)"descripcion"([^"]+)"imagen"([^"]+)"/g;
      while ((match = fallbackRegex.exec(normalized)) !== null) {
        let imageUrl = match[3];
        const mdMatch = imageUrl.match(/\[([^\]]+)\]\(([^\)]+)\)/);
        if (mdMatch) imageUrl = mdMatch[2] || mdMatch[1];
        parsed.push({ titulo: match[1], descripcion: match[2], imagen: imageUrl });
      }

      return parsed;
    };

    const MOCK_QUIZ = {
      title: "Aventura Matemática",
      questions: [
        { id: 1, question: "¿Cuánto es 7 + 8?", options: ["14", "15", "16", "13"], correct: 1 },
        { id: 2, question: "Si tienes 3 manzanas y te dan 4 más, ¿cuántas tienes?", options: ["6", "8", "7", "9"], correct: 2 },
        { id: 3, question: "¿Cuál es el doble de 6?", options: ["10", "12", "14", "18"], correct: 1 }
      ]
    };

    // --- REUSABLE COMPONENTS ---
    const GalaxyCanvas = ({ isActive, mouseX = 0, mouseY = 0 }) => {
      const canvasRef = React.useRef(null);

      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let stars = [];
        let width = canvas.width = canvas.offsetWidth || 300;
        let height = canvas.height = canvas.offsetHeight || 400;

        // Nebula states
        let nebulaAngle = 0;

        // Initialize stars
        const starCount = 45;
        const colors = [
          'rgba(255, 255, 255, ',
          'rgba(173, 216, 230, ', // Light blue
          'rgba(253, 224, 71, ',  // Yellow-500
          'rgba(244, 63, 94, '    // Rose-500
        ];

        for (let i = 0; i < starCount; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            size: Math.random() * 1.5 + 0.5,
            speedX: (Math.random() - 0.5) * 0.15,
            speedY: (Math.random() - 0.5) * 0.15,
            twinkleSpeed: Math.random() * 0.03 + 0.01,
            phase: Math.random() * Math.PI * 2,
            colorPrefix: colors[Math.floor(Math.random() * colors.length)]
          });
        }

        const handleResize = () => {
          if (!canvas) return;
          width = canvas.width = canvas.offsetWidth;
          height = canvas.height = canvas.offsetHeight;
        };

        window.addEventListener('resize', handleResize);

        const render = () => {
          ctx.clearRect(0, 0, width, height);

          // 1. Draw Space Background (Zinc-950 gradient)
          const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
          bgGrad.addColorStop(0, '#09090b');
          bgGrad.addColorStop(1, '#020205');
          ctx.fillStyle = bgGrad;
          ctx.fillRect(0, 0, width, height);

          // 2. Draw 2 Animated Nebulas (Radial Gradients with dynamic coordinates)
          nebulaAngle += 0.003;
          const neb1X = width / 2 + Math.cos(nebulaAngle) * (width * 0.15);
          const neb1Y = height / 2 + Math.sin(nebulaAngle) * (height * 0.15);
          const neb1 = ctx.createRadialGradient(neb1X, neb1Y, 10, neb1X, neb1Y, Math.max(width, height) * 0.6);
          neb1.addColorStop(0, 'rgba(37, 99, 235, 0.25)'); // Blue-600 tint
          neb1.addColorStop(0.5, 'rgba(139, 92, 246, 0.12)'); // Violet-500 tint
          neb1.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = neb1;
          ctx.fillRect(0, 0, width, height);

          const neb2X = width / 2 - Math.sin(nebulaAngle * 0.8) * (width * 0.2);
          const neb2Y = height / 2 - Math.cos(nebulaAngle * 0.8) * (height * 0.2);
          const neb2 = ctx.createRadialGradient(neb2X, neb2Y, 5, neb2X, neb2Y, Math.max(width, height) * 0.5);
          neb2.addColorStop(0, 'rgba(6, 182, 212, 0.2)'); // Cyan-500 tint
          neb2.addColorStop(0.5, 'rgba(236, 72, 153, 0.08)'); // Pink-500 tint
          neb2.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = neb2;
          ctx.fillRect(0, 0, width, height);

          // 3. Parallax offset calculated from cursor position
          // Shift drawing of stars slightly opposite to mouse movement from center
          const centerX = width / 2;
          const centerY = height / 2;
          const parallaxX = -(mouseX - centerX) * 0.08;
          const parallaxY = -(mouseY - centerY) * 0.08;

          // 4. Draw Stars
          stars.forEach(star => {
            // Twinkle logic
            star.phase += star.twinkleSpeed;
            const opacity = (Math.sin(star.phase) + 1) / 2 * 0.7 + 0.3;

            // Update star position (ambient slow drift)
            star.x += star.speedX;
            star.y += star.speedY;

            // Wrap around screen edges
            if (star.x < 0) star.x = width;
            if (star.x > width) star.x = 0;
            if (star.y < 0) star.y = height;
            if (star.y > height) star.y = 0;

            // Apply Parallax shift
            let drawX = star.x + parallaxX;
            let drawY = star.y + parallaxY;

            // Wrap parallaxed positions too to avoid empty spots
            if (drawX < 0) drawX += width;
            if (drawX > width) drawX -= width;
            if (drawY < 0) drawY += height;
            if (drawY > height) drawY -= height;

            ctx.beginPath();
            ctx.arc(drawX, drawY, star.size, 0, Math.PI * 2);
            ctx.fillStyle = star.colorPrefix + opacity + ')';
            ctx.fill();
          });

          animationFrameId = requestAnimationFrame(render);
        };

        if (isActive) {
          render();
        } else {
          // Static starfield when inactive to prevent blank frame during transit
          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = '#09090b';
          ctx.fillRect(0, 0, width, height);
        }

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('resize', handleResize);
        };
      }, [isActive, mouseX, mouseY]);

      return (
        <canvas 
          ref={canvasRef} 
          className="absolute inset-0 w-full h-full pointer-events-none rounded-[1.8rem]"
          style={{ display: 'block' }}
        />
      );
    };
    const Button = ({ children, variant = 'primary', size = 'md', className = '', onClick, ...props }) => {
      const base = "inline-flex items-center justify-center rounded-2xl font-bold transition-all duration-300 relative overflow-hidden group";
      const variants = {
        primary: "bg-blue-600 text-white shadow-[0_8px_30px_rgb(37,99,235,0.3)] hover:shadow-[0_8px_30px_rgb(37,99,235,0.5)] hover:-translate-y-1",
        secondary: "bg-white text-zinc-800 border border-zinc-200 hover:border-zinc-300 hover:bg-zinc-50 shadow-sm hover:-translate-y-1",
        ghost: "bg-transparent text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900",
        glow: "bg-zinc-900 text-white shadow-[0_0_40px_rgba(255,255,255,0.3)] hover:shadow-[0_0_60px_rgba(255,255,255,0.5)] border border-zinc-700 hover:-translate-y-1"

      const sizes = { sm: "px-4 py-2 text-sm", md: "px-6 py-3 text-base", lg: "px-8 py-4 text-lg" };
      
      return (

          whileTap={{ scale: 0.95 }}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} 
          onClick={onClick}
          {...props}
        >
          {variant === 'primary' && <span className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]" />}
          <span className="relative flex items-center justify-center gap-2">{children}</span>
        </motion.button>
      );
    };

    const Badge = ({ children, className = '' }) => (
      <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${className}`}>

      </span>
    );

    const CardContentLayout = ({ id, title, subject, level, duration, points, bg, icon: Icon, finalImageUrl, description, locked, isDarkTheme, tag }) => {
      return (
        <div className={`relative p-6 h-full flex flex-col z-10 overflow-hidden ${isDarkTheme ? 'bg-transparent text-white' : 'bg-white text-zinc-900'}`}>
          {!isDarkTheme && <div className={`absolute -right-10 -top-10 w-32 h-32 rounded-full ${bg} opacity-50 blur-2xl group-hover:blur-3xl transition-all duration-500`} />}
          
          {/* Image Preview Banner */}
          {finalImageUrl && (
            <div className={`relative w-full h-44 rounded-2xl overflow-hidden mb-5 border shadow-inner z-20 ${isDarkTheme ? 'border-zinc-800' : 'border-zinc-100/80'}`} style={{ transform: "translateZ(30px)" }}>
              {/* Animated Badge */}
              {tag && (
                <motion.div 
                  initial={{ opacity: 0, scale: 0.8, y: -10 }}
                  animate={{ opacity: 1, scale: 1, y: 0 }}
                  transition={{ type: "spring", stiffness: 200, damping: 15, delay: 0.1 }}
                  className="absolute top-3 left-3 z-30"
                >

      const y = useMotionValue(0);
      const [isHovered, setIsHovered] = useState(false);
      const [mouseX, setMouseX] = useState(0);
      const [mouseY, setMouseY] = useState(0);

      const mouseXSpring = useSpring(x);
      const mouseYSpring = useSpring(y);

      // Specular shine speculative angle & Tilt angle capped to max 15deg (was 7.5deg)
      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["15deg", "-15deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-15deg", "15deg"]);

      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mX = e.clientX - rect.left;
        const mY = e.clientY - rect.top;
        
        // Direct CSS variable updates for spotlight and shine positioning
        if (cardRef.current) {
          cardRef.current.style.setProperty('--mouse-x', `${mX}px`);
          cardRef.current.style.setProperty('--mouse-y', `${mY}px`);
        }

        const xPct = mX / width - 0.5;
        const yPct = mY / height - 0.5;
        x.set(xPct);
        y.set(yPct);

        setMouseX(mX);
        setMouseY(mY);
        setIsHovered(true);
      };

      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
        setIsHovered(false);
      };

      const finalImageUrl = getImageUrl(image, id, title, isHovered);

      return (

          ref={cardRef}
          style={{ rotateX, rotateY, transformStyle: "preserve-3d" }}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          onClick={onClick}

            }}

            </div>
          </div>

                <div className="grid sm:grid-cols-2 gap-6">
                  {q.options.map((opt, i) => {
                    const isSelected = selected === i;
                    const isCorrect = i === q.correct;
                    let btnClass = "bg-white border-2 border-zinc-200 text-zinc-700 hover:border-blue-400 hover:bg-blue-50";
                    if (status !== 'idle') {
                      if (isCorrect) btnClass = "bg-green-50 border-2 border-green-500 text-green-700 shadow-md";
                      else if (isSelected) btnClass = "bg-red-50 border-2 border-red-500 text-red-700 shadow-md";
                      else btnClass = "bg-zinc-50 border-2 border-zinc-200 text-zinc-400 opacity-50";
                    }
                    return (
                      <button key={i} onClick={() => handleSelect(i)} disabled={status !== 'idle'} className={`relative p-8 rounded-[2rem] font-bold text-2xl transition-all duration-300 transform active:scale-95 ${btnClass}`}>
                        {opt}
                        {status !== 'idle' && isCorrect && <motion.div initial={{scale:0}} animate={{scale:1}} className="absolute -top-4 -right-4 bg-white rounded-full text-green-500 shadow-lg"><CheckCircle2 size={36} fill="currentColor" className="text-white bg-green-500 rounded-full"/></motion.div>}
                        {status !== 'idle' && isSelected && !isCorrect && <motion.div initial={{scale:0}} animate={{scale:1}} className="absolute -top-4 -right-4 bg-white rounded-full text-red-500 shadow-lg"><XCircle size={36} fill="currentColor" className="text-white bg-red-500 rounded-full"/></motion.div>}
                      </button>
                    )
                  })}
                </div>
                <AnimatePresence>
                  {status !== 'idle' && (
                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }} className="mt-12 flex justify-center">
                      <Button variant={status === 'correct' ? 'primary' : 'secondary'} size="lg" onClick={handleNext} className={`w-full sm:w-auto px-16 py-5 text-xl rounded-2xl ${status==='correct' ? 'bg-green-500 hover:bg-green-600 shadow-[0_8px_30px_rgb(34,197,94,0.3)]' : ''}`}>

                      </Button>
                    </motion.div>
                  )}
                </AnimatePresence>
              </motion.div>
            </AnimatePresence>
          </div>
        </div>
      );

    const App = () => {
      const [view, setView] = useState('landing');
      const [params, setParams] = useState({});
      const [lockedGame, setLockedGame] = useState(null);
      
      // Estado del Usuario (Caché del navegador)
      const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('eduplay_user');
        if (saved) {
          try {
            return JSON.parse(saved);
          } catch (e) {
            console.error("Error al cargar perfil, reiniciando al invitado", e);
          }
        }
        return {
          name: "Aventurero",
          avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Aventurero&backgroundColor=ffdfbf",
          level: 1,
          xp: 0,
          nextLevelXp: 100,
          streak: 1,
          completedChallenges: 0,
          badges: [
            { id: 1, name: "Matemático Veloz", color: "text-yellow-500", bg: "bg-yellow-100" }
          ]
        };
      });

      const saveUser = (updatedUser) => {
        setUser(updatedUser);
        localStorage.setItem('eduplay_user', JSON.stringify(updatedUser));
      };

      const addXp = (amount) => {
        let newXp = user.xp + amount;
        let newLevel = user.level;
        let newNextLevelXp = user.nextLevelXp;

        while (newXp >= newNextLevelXp) {
          newXp -= newNextLevelXp;
          newLevel += 1;
          newNextLevelXp = newLevel * 200; // Incremento progresivo de XP requerida
        }

        let newBadges = [...(user.badges || [])];
        if (newLevel >= 2 && !newBadges.some(b => b.id === 4)) {
          newBadges.push({ id: 4, name: "Super Aprendiz", color: "text-purple-500", bg: "bg-purple-100" });
        }
        if (newLevel >= 5 && !newBadges.some(b => b.id === 5)) {
          newBadges.push({ id: 5, name: "Héroe Educativo", color: "text-amber-500", bg: "bg-amber-100" });
        }

        const updated = {
          ...user,
          xp: newXp,
          level: newLevel,
          nextLevelXp: newNextLevelXp,
          completedChallenges: (user.completedChallenges || 0) + 1,
          badges: newBadges
        };
        saveUser(updated);
      };

      // Estado de la API
      const [apiUrl, setApiUrl] = useState(() => localStorage.getItem('eduplay_api_url') || '');
      const [inputUrl, setInputUrl] = useState(() => localStorage.getItem('eduplay_api_url') || '');
      const [apiStatus, setApiStatus] = useState('disconnected'); // 'disconnected' | 'connecting' | 'connected'
      const [games, setGames] = useState(MOCK_GAMES);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);

      const navigate = (newView, newParams = {}) => {
        setParams(newParams);
        setView(newView);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // Función para conectar y cargar juegos de la API
      const loadApiGames = async (urlToTest) => {
        if (!urlToTest) {
          setGames(MOCK_GAMES);
          setApiStatus('disconnected');
          return false;
        }

        setApiStatus('connecting');
        
        // Limpiar URL y agregar protocolo si falta
        let cleanUrl = urlToTest.trim();
        if (!/^https?:\/\//i.test(cleanUrl)) {
          cleanUrl = 'http://' + cleanUrl;
        }

        try {
          // Remover diagonal final si la tiene
          cleanUrl = cleanUrl.replace(/\/$/, "");
          
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 5000); // 5s timeout

          const res = await fetch(`${cleanUrl}/juegos`, { 
            mode: 'cors',
            headers: {
              "ngrok-skip-browser-warning": "true"
            },
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);

          if (!res.ok) throw new Error("Error en respuesta del servidor");
          const text = await res.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch {
            data = parseApiResponsePayload(text);
          }
          if (!Array.isArray(data)) throw new Error("Formato de datos inesperado");

          const apiGamesMapped = data.map((g, index) => {
            const title = g.titulo || g.title || `Juego ${index + 1}`;
            const normalizedTitle = title.toLowerCase();
            const subject = normalizedTitle.includes('matem') ? 'Matemáticas'
              : normalizedTitle.includes('letras') ? 'Lectura'
              : normalizedTitle.includes('ciencia') || normalizedTitle.includes('explorador') ? 'Ciencias'
              : 'General';
            const icon = normalizedTitle.includes('matem') ? Zap
              : normalizedTitle.includes('letras') ? BookOpen
              : normalizedTitle.includes('ciencia') || normalizedTitle.includes('explorador') ? FlaskConical
              : Shield;

            return {
              id: `api-${g.id ?? index}`,
              title,
              subject,
              level: 'Todas',
              duration: g.duracion || '5 min',
              points: g.puntos ?? 100,
              color: subject === 'Matemáticas' ? 'from-blue-500 to-cyan-400' : subject === 'Lectura' ? 'from-red-500 to-pink-400' : 'from-green-500 to-emerald-400',
              bg: subject === 'Matemáticas' ? 'bg-blue-50' : subject === 'Lectura' ? 'bg-red-50' : 'bg-green-50',
              icon,
              image: g.imagen || g.image,
              description: g.descripcion || g.description || 'Explora este juego educativo.',
              isApi: true
            };
          });

          setGames([...apiGamesMapped, ...MOCK_GAMES]);
          setApiStatus('connected');
          return true;
        } catch (err) {
          console.error("Error al conectar con la API:", err);
          setGames(MOCK_GAMES);
          setApiStatus('disconnected');
          return false;
        }
      };

      // Intentar cargar al iniciar si hay una URL guardada
      useEffect(() => {
        if (apiUrl) {
          loadApiGames(apiUrl);
        }
      }, [apiUrl]);

      const handleTestConnection = async () => {
        await loadApiGames(inputUrl);
      };

      const handleSaveSettings = async () => {
        const success = await loadApiGames(inputUrl);
        localStorage.setItem('eduplay_api_url', inputUrl.trim());
        setApiUrl(inputUrl.trim());
        setIsSettingsOpen(false);
      };

      const views = {
        landing: <Landing onNavigate={navigate} onLockClick={setLockedGame} games={games} />,
        catalog: <Catalog onNavigate={navigate} onLockClick={setLockedGame} games={games} />,
        dashboard: <Dashboard onNavigate={navigate} user={user} />,
        game: <QuizGame onNavigate={navigate} onAddXp={addXp} gameId={params.gameId} />,
        parents: <ParentsPanel onNavigate={navigate} />,
        profile: <ProfilePanel onNavigate={navigate} user={user} onSaveUser={saveUser} />,
        pricing: <PricingPanel onNavigate={navigate} />
      };

      return (
        <div className="w-full min-h-screen relative font-sans text-zinc-900 selection:bg-blue-200">
          <Navbar 
            currentView={view} 
            onNavigate={navigate} 
            apiStatus={apiStatus} 
            onOpenSettings={() => {
              setInputUrl(apiUrl);
              setIsSettingsOpen(true);
            }} 
          />
          
          <AnimatePresence mode="wait">
            <motion.div key={view} initial={{ opacity: 0, filter: 'blur(10px)' }} animate={{ opacity: 1, filter: 'blur(0px)' }} exit={{ opacity: 0, filter: 'blur(10px)' }} transition={{ duration: 0.4 }}>
              {views[view]}
            </motion.div>
          </AnimatePresence>

          {/* Modal de Configuración de API */}
          <AnimatePresence>
            {isSettingsOpen && (
              <motion.div 
                initial={{ opacity: 0 }} 
                animate={{ opacity: 1 }} 
                exit={{ opacity: 0 }} 
                className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-md"
                style={{ zIndex: 100 }}
              >
                <motion.div 
                  initial={{ scale: 0.95, y: 20 }} 
                  animate={{ scale: 1, y: 0 }} 
                  exit={{ scale: 0.95, y: 20 }}
                  transition={{ type: "spring", damping: 25, stiffness: 350 }}
                  className="bg-white rounded-[2.5rem] border border-zinc-100 p-8 md:p-10 w-full max-w-lg shadow-2xl relative"
                >
                  <button 
                    onClick={() => setIsSettingsOpen(false)} 
                    className="absolute top-6 right-6 w-10 h-10 rounded-full bg-zinc-100 hover:bg-zinc-200 text-zinc-500 flex items-center justify-center transition-colors"
                  >
                    <XCircle size={20} />
                  </button>

                  <div className="flex items-center gap-4 mb-6">
                    <div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center">
                      <Globe size={24} />
                    </div>
                    <div>
                      <h3 className="text-2xl font-black text-zinc-900">Configuración de API</h3>
                      <p className="text-sm text-zinc-500 font-medium">Conecta el portal con el servidor FastAPI local</p>
                    </div>
                  </div>

                  <div className="space-y-6">
                    <div>
                      <label className="block text-sm font-bold text-zinc-700 mb-2">URL del Túnel Ngrok / Localhost</label>
                      <div className="relative">
                        <input 
                          type="text" 
                          value={inputUrl} 
                          onChange={(e) => setInputUrl(e.target.value)}
                          placeholder="https://xxxx-xxxx.ngrok-free.app" 
                          className="w-full px-5 py-4 rounded-2xl border-2 border-zinc-200 focus:border-blue-500 focus:outline-none font-medium transition-colors text-base"
                        />
                      </div>
                      <p className="text-xs text-zinc-400 mt-2 font-medium">Pega la URL pública generada por Ngrok (ej: `ngrok http 8000`).</p>
                    </div>

                    {/* Detalles de Estado de Conexión */}
                    <div className="p-5 rounded-2xl bg-zinc-50 border border-zinc-100">
                      <div className="flex items-center justify-between mb-3">
                        <span className="text-sm font-bold text-zinc-500">Estado de Conexión:</span>
                        <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-black uppercase tracking-wider ${apiStatus === 'connected' ? 'bg-green-100 text-green-700' : apiStatus === 'connecting' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>
                          {apiStatus === 'connected' ? 'Conectado' : apiStatus === 'connecting' ? 'Probando...' : 'Desconectado'}
                        </span>
                      </div>
                      <p className="text-xs text-zinc-500 leading-relaxed font-medium">
                        {apiStatus === 'connected' 
                          ? '¡Excelente! Los juegos de la API han sido cargados e integrados al catálogo con éxito.' 
                          : apiStatus === 'connecting' 
                          ? 'Intentando contactar al servidor...' 
                          : 'Utilizando juegos locales (MOCK_GAMES) como respaldo por defecto.'}
                      </p>
                    </div>

                    <div className="flex gap-4">
                      <Button 
                        variant="secondary" 
                        onClick={handleTestConnection}
                        className="flex-1 py-4"
                        disabled={apiStatus === 'connecting'}
                      >
                        Probar Conexión
                      </Button>
                      <Button 
                        variant="primary" 
                        onClick={handleSaveSettings}
                        className="flex-1 py-4 shadow-blue-500/20"
                        disabled={apiStatus === 'connecting'}
                      >
                        Guardar y Cerrar
                      </Button>
                    </div>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Modal de Juego Bloqueado / Waitlist */}
          <AnimatePresence>
            {lockedGame && (
              <motion.div 
                initial={{ opacity: 0 }} 
                animate={{ opacity: 1 }} 
                exit={{ opacity: 0 }} 
                className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-md"
                style={{ zIndex: 110 }}
              >
                <motion.div 
                  initial={{ scale: 0.95, y: 20 }} 
                  animate={{ scale: 1, y: 0 }} 
                  exit={{ scale: 0.95, y: 20 }}
                  className="bg-white rounded-[2.5rem] border border-zinc-100 p-8 md:p-10 w-full max-w-lg shadow-2xl relative overflow-hidden"
                >
                  <div className="absolute top-0 right-0 w-40 h-40 bg-gradient-to-bl from-blue-500/10 to-purple-500/10 rounded-full blur-[40px] -z-0"></div>
                  
                  <button 
                    onClick={() => setLockedGame(null)} 
                    className="absolute top-6 right-6 w-10 h-10 rounded-full bg-zinc-100 hover:bg-zinc-200 text-zinc-500 flex items-center justify-center transition-colors"
                  >
                    <XCircle size={20} />
                  </button>

                  <div className="flex flex-col items-center text-center relative z-10">
                    <div className="w-16 h-16 rounded-2xl bg-purple-50 text-purple-600 flex items-center justify-center mb-6">
                      <Lock size={32} />
                    </div>
                    
                    <h3 className="text-3xl font-black text-zinc-900 mb-2">¡Próximamente en EduPlay Pro!</h3>
                    <p className="text-zinc-600 font-medium text-base mb-6">
                      El juego <strong className="text-zinc-950 font-bold">"{lockedGame.title}"</strong> y más de 30 aventuras interactivas avanzadas estarán disponibles muy pronto en nuestra versión completa.
                    </p>

                    <ModalWaitlistForm gameTitle={lockedGame.title} onFinish={() => setLockedGame(null)} />
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
