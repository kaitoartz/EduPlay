<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPlay - Portal Educativo Gamificado</title>
  
  <!-- Google Fonts: Plus Jakarta Sans & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          },
          animation: {
            'appear': 'appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'appear-zoom': 'appear-zoom 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'shimmer': 'shimmer 1.5s infinite linear',
          },
          keyframes: {
            appear: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'appear-zoom': {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            }
          }
        }
      }
    }
  </script>
  
  <!-- Global Styles -->
  <style>
    :root {
      --bg: #f8fafc;
    }
    .dark {
      --bg: #09090b;
    }
    body {
      background-color: var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #2563eb, #06b6d4, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Spotlight mask overlay styling */
    .card-spotlight-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      user-select: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      background-image: url('galaxy.webp');
      background-size: cover;
      background-position: center;
      mask-image: radial-gradient(
        180px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        black 20%,
        transparent 100%
      );
      -webkit-mask-image: radial-gradient(
        180px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        black 20%,
        transparent 100%
      );
    }
    .group:hover .card-spotlight-overlay {
      opacity: 1;
    }
  </style>

  <!-- ═══ UI COMPONENT LIBRARY (Namespaced ep-*) ═══ -->
  <style>
    /* ── ep-shine-btn: CTA button with light sweep (button.css) ── */
    .ep-shine-btn {
      position: relative; transition: all 0.3s ease-in-out;
      box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
      padding-block: 0.5rem; padding-inline: 1.25rem;
      background-color: rgb(0 107 179); border-radius: 9999px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; gap: 10px; font-weight: bold;
      border: 3px solid #ffffff4d; outline: none; overflow: hidden;
      font-size: 15px; cursor: pointer;
    }
    .ep-shine-btn .ep-shine-icon { width: 24px; height: 24px; transition: all 0.3s ease-in-out; }
    .ep-shine-btn:hover { transform: scale(1.05); border-color: #fff9; }
    .ep-shine-btn:hover .ep-shine-icon { transform: translate(4px); }
    .ep-shine-btn:hover::before { animation: ep-shine 1.5s ease-out infinite; }
    .ep-shine-btn::before {
      content: ""; position: absolute; width: 100px; height: 100%;
      background-image: linear-gradient(120deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.8), rgba(255,255,255,0) 70%);
      top: 0; left: -100px; opacity: 0.6;
    }
    @keyframes ep-shine { 0% { left: -100px; } 60% { left: 100%; } to { left: 100%; } }

    /* ── ep-star-btn: Hover star explosion button (star-button.css) ── */
    .ep-star-btn {
      position: relative; padding: 12px 35px; background: #fec195;
      font-size: 17px; font-weight: 500; color: #181818;
      border: 3px solid #fec195; border-radius: 8px;
      box-shadow: 0 0 0 #fec1958c; transition: all 0.3s ease-in-out; cursor: pointer;
    }
    .ep-star-btn .ep-s1,.ep-star-btn .ep-s2,.ep-star-btn .ep-s3,
    .ep-star-btn .ep-s4,.ep-star-btn .ep-s5,.ep-star-btn .ep-s6 {
      position: absolute; height: auto; filter: drop-shadow(0 0 0 #fffdef); z-index: -5;
    }
    .ep-star-btn .ep-s1 { top:20%;left:20%;width:25px;transition:all 1s cubic-bezier(.05,.83,.43,.96); }
    .ep-star-btn .ep-s2 { top:45%;left:45%;width:15px;transition:all 1s cubic-bezier(0,.4,0,1.01); }
    .ep-star-btn .ep-s3 { top:40%;left:40%;width:5px;transition:all 1s cubic-bezier(0,.4,0,1.01); }
    .ep-star-btn .ep-s4 { top:20%;left:40%;width:8px;transition:all .8s cubic-bezier(0,.4,0,1.01); }
    .ep-star-btn .ep-s5 { top:25%;left:45%;width:15px;transition:all .6s cubic-bezier(0,.4,0,1.01); }
    .ep-star-btn .ep-s6 { top:5%;left:50%;width:5px;transition:all .8s ease; }
    .ep-star-btn:hover { background:transparent;color:#fec195;box-shadow:0 0 25px #fec1958c; }
    .ep-star-btn:hover .ep-s1{top:-80%;left:-30%;width:25px;filter:drop-shadow(0 0 10px #fffdef);z-index:2;}
    .ep-star-btn:hover .ep-s2{top:-25%;left:10%;width:15px;filter:drop-shadow(0 0 10px #fffdef);z-index:2;}
    .ep-star-btn:hover .ep-s3{top:55%;left:25%;width:5px;filter:drop-shadow(0 0 10px #fffdef);z-index:2;}
    .ep-star-btn:hover .ep-s4{top:30%;left:80%;width:8px;filter:drop-shadow(0 0 10px #fffdef);z-index:2;}
    .ep-star-btn:hover .ep-s5{top:25%;left:115%;width:15px;filter:drop-shadow(0 0 10px #fffdef);z-index:2;}
    .ep-star-btn:hover .ep-s6{top:5%;left:60%;width:5px;filter:drop-shadow(0 0 10px #fffdef);z-index:2;}
    .ep-fil0 { fill: #fffdef; }

    /* ── ep-fav: Favourite star toggle (favourite.css) ── */
    .ep-fav input { position:absolute;opacity:0;cursor:pointer;height:0;width:0; }
    .ep-fav { display:block;position:relative;cursor:pointer;user-select:none; }
    .ep-fav svg { position:relative;top:0;left:0;height:28px;width:28px;transition:all .3s;fill:#666; }
    .ep-fav svg:hover { transform:scale(1.1); }
    .ep-fav input:checked ~ svg { fill:#ffeb49; }

    /* ── ep-rating: Star rating with glow (rating.css) ── */
    .ep-rating { display:flex;justify-content:center;gap:10px;flex-direction:row-reverse; }
    .ep-rating > input { position:absolute;appearance:none; }
    .ep-rating > label { cursor:pointer;font-size:30px;position:relative;display:inline-block;transition:transform .3s ease; }
    .ep-rating > label > svg { fill:#666;transition:fill .3s ease; }
    .ep-rating > label:hover { transform:scale(1.2); }
    .ep-rating > label:hover > svg,
    .ep-rating > label:hover ~ label > svg { fill:#ff9e0b;filter:drop-shadow(0 0 15px rgba(255,158,11,.9)); }
    .ep-rating > input:checked + label > svg,
    .ep-rating > input:checked + label ~ label > svg { fill:#ff9e0b;filter:drop-shadow(0 0 15px rgba(255,158,11,.9)); }
    .ep-rating input:checked ~ label svg { fill:#ffa723; }

    /* ── ep-skeleton: Upload skeleton shimmer (skeleton-ux.css) ── */
    .ep-skeleton {
      width:100%;border-radius:20px;border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);box-shadow:0 28px 80px rgba(0,0,0,.55);
      overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      font-family:ui-sans-serif,system-ui;
    }
    .ep-skeleton .ep-sk-head {
      display:grid;grid-template-columns:42px 1fr auto;gap:12px;padding:14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      align-items:center;
    }
    .ep-skeleton .ep-sk-icon {
      width:42px;height:42px;border-radius:14px;
      background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.18),rgba(255,255,255,.05) 45%,rgba(0,0,0,.22) 100%),
      linear-gradient(135deg,rgba(110,231,255,.35),rgba(176,140,255,.25));
      border:1px solid rgba(255,255,255,.12);
    }
    .ep-skeleton .ep-sk-pill {
      font-size:12px;padding:8px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
      color:rgba(255,255,255,.72);
    }
    .ep-skeleton .ep-sk-mid { padding:14px; }
    .ep-skeleton .ep-sk-bar {
      height:12px;border-radius:999px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.07);margin:10px 0;overflow:hidden;position:relative;
    }
    .ep-skeleton .ep-sk-bar::before {
      content:"";position:absolute;inset:-40% -60%;
      background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.1) 22%,rgba(255,255,255,.2) 30%,transparent 44%);
      transform:translateX(-60%);animation:ep-sk-shimmer 1.15s cubic-bezier(.2,.8,.2,1) infinite;
      mix-blend-mode:screen;
    }
    .ep-skeleton .ep-sk-title { width:62%;height:13px;margin:2px 0 8px; }
    .ep-skeleton .ep-sk-sub { width:44%;height:11px;margin:0;opacity:.9; }
    .ep-skeleton .ep-sk-wide { width:100%; }
    .ep-skeleton .ep-sk-short { width:62%; }
    .ep-skeleton .ep-sk-progress {
      height:10px;margin:2px 14px 14px;border-radius:999px;position:relative;overflow:hidden;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
    }
    .ep-skeleton .ep-sk-progress .ep-sk-flow {
      position:absolute;inset:0;
      background:linear-gradient(90deg,rgba(110,231,255,0),rgba(110,231,255,.55),rgba(176,140,255,.55),rgba(110,231,255,0));
      transform:translateX(-70%);animation:ep-sk-flow2 1.05s cubic-bezier(.2,.8,.2,1) infinite;
    }
    @keyframes ep-sk-shimmer { to { transform:translateX(60%); } }
    @keyframes ep-sk-flow2 { 0%{transform:translateX(-75%);opacity:.55;} 50%{opacity:1;} 100%{transform:translateX(75%);opacity:.55;} }

    /* ── ep-earth: Earth globe loader (wait.css) ── */
    .ep-earth-loader {
      --watercolor:#3344c1;--landcolor:#7cc133;
      width:5em;height:5em;background-color:var(--watercolor);
      position:relative;overflow:hidden;border-radius:50%;
      box-shadow:inset 0 .5em rgba(255,255,255,.25),inset 0 -.5em rgba(0,0,0,.25);
      border:solid .15em white;animation:ep-startround 1s 1;
    }
    .ep-earth-loader svg:nth-child(1){position:absolute;bottom:-2em;width:5em;height:auto;animation:ep-round1 5s infinite linear .75s;}
    .ep-earth-loader svg:nth-child(2){position:absolute;top:-3em;width:5em;height:auto;animation:ep-round1 5s infinite linear;}
    .ep-earth-loader svg:nth-child(3){position:absolute;top:-2.5em;width:5em;height:auto;animation:ep-round2 5s infinite linear;}
    .ep-earth-loader svg:nth-child(4){position:absolute;bottom:-2.2em;width:5em;height:auto;animation:ep-round2 5s infinite linear .75s;}
    @keyframes ep-startround { 0%{filter:brightness(500%);box-shadow:none;} 75%{filter:brightness(500%);box-shadow:none;} 100%{filter:brightness(100%);} }
    @keyframes ep-round1 { 0%{left:-2em;opacity:1;transform:skewX(0) rotate(0);} 30%{left:-6em;opacity:1;transform:skewX(-25deg) rotate(25deg);} 31%{left:-6em;opacity:0;} 35%{left:7em;opacity:0;transform:skewX(25deg) rotate(-25deg);} 45%{left:7em;opacity:1;} 100%{left:-2em;opacity:1;transform:skewX(0) rotate(0);} }
    @keyframes ep-round2 { 0%{left:5em;opacity:1;transform:skewX(0) rotate(0);} 75%{left:-7em;opacity:1;transform:skewX(-25deg) rotate(25deg);} 76%{left:-7em;opacity:0;} 77%{left:8em;opacity:0;} 80%{left:8em;opacity:1;} 100%{left:5em;opacity:1;transform:skewX(0) rotate(0);} }

    /* ── ep-planet: Planet orbital loader (loading-2.css) ── */
    .ep-planet-wrap { width:200px;height:200px;position:relative;display:flex;justify-content:center;align-items:center; }
    .ep-planet-wrap .ep-planet {
      width:65%;height:65%;background-color:#546c8c;border-radius:100%;
      position:absolute;display:flex;align-items:center;transform-origin:center;
      box-shadow:inset 2px -10px 0 rgba(0,0,0,.1);animation:ep-planet-anim 5s ease infinite alternate;
    }
    @keyframes ep-planet-anim { 0%{transform:rotate(10deg);} 100%{transform:rotate(-10deg);} }
    .ep-planet-wrap .ep-planet .ep-ring {
      position:absolute;width:200px;height:200px;border-radius:100%;
      background-color:#bacbd9;display:flex;align-items:center;justify-content:center;
      transform-origin:33% center;box-shadow:2px -10px 0 rgba(0,0,0,.1),inset -5px -10px 0 rgba(0,0,0,.1);
      animation:ep-ring-anim 3s ease infinite;
    }
    @keyframes ep-ring-anim { 0%{transform:rotateX(110deg) rotateZ(0) translate(-50px,5px);} 100%{transform:rotateX(110deg) rotateZ(360deg) translate(-50px,5px);} }
    .ep-planet-wrap .ep-planet .ep-ring::before {
      content:"";position:absolute;width:10px;height:30px;border-radius:100%;
      background-color:#7ea1bf;z-index:2;left:calc(0px - 5px);box-shadow:inset -3px 3px 0 rgba(0,0,0,.2);
    }
    .ep-planet-wrap .ep-planet .ep-ring::after {
      content:"";position:absolute;width:160px;height:160px;border-radius:100%;
      background-color:#7ea1bf;box-shadow:inset 2px -10px 0 rgba(0,0,0,.1);
    }
    .ep-planet-wrap .ep-planet .ep-cover-ring {
      position:absolute;width:100%;height:50%;border-bottom-left-radius:80%;border-bottom-right-radius:80%;
      border-top-left-radius:100px;border-top-right-radius:100px;
      transform:translate(0,-17px);background-color:#546c8c;z-index:2;
    }
    .ep-planet-wrap .ep-planet .ep-spots { width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:absolute;z-index:2; }
    .ep-planet-wrap .ep-planet .ep-spots span {
      width:20px;height:20px;background-color:#3c4359;position:absolute;border-radius:100%;
      box-shadow:inset -2px 3px 0 rgba(0,0,0,.3);
    }
    .ep-planet-wrap .ep-planet .ep-spots span:nth-child(1){top:15px;right:35px;}
    .ep-planet-wrap .ep-planet .ep-spots span:nth-child(2){top:30px;left:35px;width:10px;height:10px;}
    .ep-planet-wrap .ep-planet .ep-spots span:nth-child(3){top:55px;left:15px;width:18px;height:18px;}
    .ep-planet-wrap .ep-planet .ep-spots span:nth-child(4){top:55px;left:60px;width:28px;height:28px;}
    .ep-planet-wrap p { color:#bacbd9;font-size:12px;z-index:2;position:absolute;bottom:-15px;font-family:'Roboto Mono',monospace;text-align:center;width:80px; }

    /* ── ep-ticket: 3D Boarding Pass/Aventurero ID (card-profile.css) ── */
    .ep-ticket-wrap { --t-bg:#0d0d15;--t-bg-light:#151525;--t-accent:#00d2ff;--t-accent-glow:rgba(0,210,255,.4);--t-text-main:#e2e8f0;--t-text-muted:#64748b;font-size:10px;perspective:1000px;display:inline-block; }
    .ep-ticket {
      position:relative;width:22em;color:var(--t-text-main);font-family:'Plus Jakarta Sans',system-ui,sans-serif;
      transform-style:preserve-3d;transition:transform .6s cubic-bezier(.23,1,.32,1),box-shadow .6s ease;
      box-shadow:0 0 30px rgba(0,210,255,.15),0 0 0 2px rgba(0,210,255,.2);background:transparent;
      border-radius:1.5em;
    }
    .ep-ticket-wrap:hover .ep-ticket { transform:rotateX(8deg) rotateY(-12deg) scale(1.03); box-shadow:0 0 45px rgba(0,210,255,.3),0 0 0 2px rgba(0,210,255,.4); }
    .ep-ticket::after {
      content:"";position:absolute;inset:0;border-radius:1.5em;pointer-events:none;
      background:linear-gradient(115deg,transparent 0%,transparent 40%,rgba(0,210,255,.1) 45%,rgba(0,210,255,.25) 50%,rgba(0,210,255,.1) 55%,transparent 60%,transparent 100%);
      z-index:10;background-size:250% 250%;background-position:100% 100%;
      transition:background-position .6s cubic-bezier(.23,1,.32,1);mix-blend-mode:screen;
    }
    .ep-ticket-wrap:hover .ep-ticket::after { background-position:0% 0%; }
    .ep-ticket .ep-t-main {
      padding:2em;position:relative;overflow:hidden;
      background:radial-gradient(circle at bottom left,transparent 1.2em,var(--t-bg) 1.25em),
      radial-gradient(circle at bottom right,transparent 1.2em,var(--t-bg) 1.25em);
      background-size:51% 100%;background-position:bottom left,bottom right;background-repeat:no-repeat;
      border-top-left-radius:1.5em;border-top-right-radius:1.5em;
      border-bottom:1px dashed rgba(0,210,255,.2);
    }
    .ep-ticket .ep-t-main::after {
      content:"";position:absolute;inset:0;
      background-image:linear-gradient(rgba(0,210,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,.07) 1px,transparent 1px);
      background-size:1.5em 1.5em;opacity:.7;z-index:0;pointer-events:none;
      transform:perspective(500px) rotateX(15deg) scale(1.3);animation:ep-grid-scroll 25s linear infinite;
    }
    @keyframes ep-grid-scroll { 0%{background-position:0 0;} 100%{background-position:0 3em;} }
    .ep-ticket .ep-t-content { position:relative;z-index:1; }
    .ep-ticket .ep-t-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2em; }
    .ep-ticket .ep-t-logo { display:flex;align-items:center;gap:.5em;font-weight:900;font-size:1.1em;letter-spacing:.05em;color:#fff;text-shadow:0 0 8px rgba(0,210,255,.5); }
    .ep-ticket .ep-t-logo svg { width:1.4em;height:1.4em;fill:var(--t-accent);filter:drop-shadow(0 0 5px var(--t-accent)); }
    .ep-ticket .ep-t-type { font-size:.6em;text-transform:uppercase;letter-spacing:.25em;color:var(--t-accent);border:1px solid var(--t-accent);padding:.4em .8em;border-radius:4px;font-weight:800;background:rgba(0,210,255,.1);text-shadow:0 0 5px var(--t-accent-glow);box-shadow:inset 0 0 8px rgba(0,210,255,.1); }
    .ep-ticket .ep-t-title { font-size:2.4em;font-weight:900;line-height:1.1;margin-bottom:.2em;text-transform:uppercase;color:#fff;letter-spacing:.05em;text-shadow:0 0 10px rgba(255,255,255,.3); }
    .ep-ticket .ep-t-subtitle { color:var(--t-text-muted);font-size:.85em;margin-bottom:2em;font-family:monospace;letter-spacing:.05em; }
    .ep-ticket .ep-t-details { display:grid;grid-template-columns:1fr 1fr;gap:1.5em;margin-bottom:1em; }
    .ep-ticket .ep-t-label { font-size:.6em;text-transform:uppercase;letter-spacing:.15em;color:var(--t-text-muted);font-family:monospace; }
    .ep-ticket .ep-t-value { font-size:1.15em;font-weight:800;color:#fff;text-shadow:0 0 6px rgba(0,210,255,.3); }
    .ep-ticket .ep-t-perf { display:flex;justify-content:space-between;height:1em;align-items:center;position:relative;z-index:2;background:var(--t-bg); }
    .ep-ticket .ep-t-perf-line { flex-grow:1;height:0;border-top:2px dashed rgba(0,210,255,.2);margin:0 1.5em; }
    .ep-ticket .ep-t-stub {
      padding:2em;
      background:radial-gradient(circle at top left,transparent 1.2em,var(--t-bg-light) 1.25em),
      radial-gradient(circle at top right,transparent 1.2em,var(--t-bg-light) 1.25em);
      background-size:51% 100%;background-position:top left,top right;background-repeat:no-repeat;
      border-bottom-left-radius:1.5em;border-bottom-right-radius:1.5em;
      display:flex;justify-content:space-between;align-items:center;
      border-top:1px dashed rgba(0,210,255,.2);
    }
    .ep-ticket .ep-t-barcode {
      width:10em;height:3.5em;
      background:repeating-linear-gradient(90deg,#00d2ff 0,#00d2ff 2px,transparent 2px,transparent 4px,#00d2ff 4px,#00d2ff 5px,transparent 5px,transparent 8px,#00d2ff 8px,#00d2ff 12px,transparent 12px,transparent 15px,#00d2ff 15px,#00d2ff 16px,transparent 16px,transparent 18px);
      opacity:.85;
      filter:drop-shadow(0 0 3px rgba(0,210,255,.3));
    }
    .ep-ticket .ep-t-barcode-id { font-family:monospace;font-size:.7em;color:var(--t-accent);letter-spacing:.25em;margin-top:.4em; }
    .ep-ticket .ep-t-admit-text { font-size:.6em;text-transform:uppercase;letter-spacing:.2em;color:var(--t-text-muted);font-family:monospace; }
    .ep-ticket .ep-t-admit-num { font-size:3.2em;font-weight:900;line-height:1;color:var(--t-accent);text-shadow:0 0 15px var(--t-accent-glow); }

    /* ── ep-tx: Memory Chip / Power Cell (transaction.css) ── */
    .ep-tx {
      background-color:#0d0d15;display:flex;width:280px;height:80px;
      position:relative;border-radius:12px;transition:.3s ease-in-out;
      border:1px solid #10b981;box-shadow:0 0 15px rgba(16,185,129,.15);
      overflow:hidden;
    }
    .ep-tx:hover { transform:scale(1.03);width:140px; box-shadow:0 0 25px rgba(16,185,129,.35); }
    .ep-tx:hover .ep-tx-left { width:100%; }
    .ep-tx .ep-tx-left {
      background:linear-gradient(135deg,#10b981,#059669);width:80px;height:80px;border-radius:8px;
      position:relative;display:flex;justify-content:center;align-items:center;
      cursor:pointer;transition:.3s;flex-shrink:0;overflow:hidden;
    }
    .ep-tx .ep-tx-right {
      width:calc(100% - 80px);display:flex;align-items:center;overflow:hidden;
      cursor:pointer;justify-content:space-between;white-space:nowrap;transition:.3s;
      background:rgba(16,185,129,.03);
    }
    .ep-tx .ep-tx-card {
      width:45px;height:30px;background:linear-gradient(135deg,#a7f3d0,#34d399);border-radius:4px;
      position:absolute;display:flex;z-index:10;flex-direction:column;align-items:center;
      box-shadow:0 0 10px rgba(16,185,129,.5);
      border:1px solid rgba(255,255,255,.2);
    }
    .ep-tx .ep-tx-card-line { width:40px;height:6px;background-color:#059669;border-radius:1px;margin-top:4px; }
    .ep-tx:hover .ep-tx-card { animation:ep-tx-slide 1.2s cubic-bezier(.645,.045,.355,1) both; }
    @keyframes ep-tx-slide { 0%{transform:translateY(0);} 50%{transform:translateY(-50px) rotate(90deg);} 60%{transform:translateY(-50px) rotate(90deg);} 100%{transform:translateY(-5px) rotate(90deg);} }
    .ep-tx .ep-tx-new { font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;margin-left:12px;color:#a7f3d0;font-weight:700;letter-spacing:.05em; }
    .ep-tx .ep-tx-dollar { position:absolute;font-size:12px;font-family:monospace;font-weight:900;width:100%;left:0;top:0;color:#064e3b;text-align:center;height:100%;display:flex;align-items:center;justify-content:center; }
    .ep-tx:hover .ep-tx-dollar { animation:ep-tx-fadein .3s 1s backwards; color:#ffffff; text-shadow:0 0 5px rgba(255,255,255,.8); }
    @keyframes ep-tx-fadein { 0%{opacity:0;transform:translateY(-5px);} 100%{opacity:1;transform:translateY(0);} }

    /* ── ep-theme: Control Console Dial (theme-button.css) ── */
    .ep-theme-toggle { --primary:#60a5fa;--light:#e2e8f0;--dark:#0f172a;--gray:#334155;position:relative;z-index:10;width:fit-content;height:36px;border-radius:9999px; }
    .ep-theme-toggle .ep-toggle-input { display:none; }
    .ep-theme-toggle .ep-toggle-label {
      --gap:4px;--width:36px;cursor:pointer;position:relative;display:inline-block;
      padding:.35rem;width:calc((var(--width) + var(--gap)) * 2);height:100%;
      background-color:#1e293b;border:2px solid #475569;
      border-radius:9999px;box-sizing:content-box;transition:all .3s ease-in-out;
      box-shadow:inset 0 2px 5px rgba(0,0,0,.5);
    }
    .ep-theme-toggle .ep-toggle-label::before {
      content:"SYSTEM CORE";position:absolute;z-index:-10;top:-16px;left:50%;transform:translateX(-50%);
      font-size:7px;font-family:monospace;font-weight:900;letter-spacing:.1em;color:#64748b;
      white-space:nowrap;transition:all .3s ease-in-out;
    }
    .ep-theme-toggle .ep-toggle-label::after {
      content:"";position:absolute;z-index:-10;top:50%;left:50%;transform:translate(-50%,-50%);
      width:100%;height:100%;background-image:radial-gradient(circle at 50% -100%,rgba(96,165,250,.3) 0%,rgba(15,23,42,1) 85%);
      border-radius:9999px;
    }
    .ep-theme-toggle .ep-cont-icon {
      position:relative;display:flex;justify-content:center;align-items:center;
      width:var(--width);height:36px;
      background:linear-gradient(to bottom,#475569,#334155);
      border:1px solid #64748b;border-radius:9999px;
      box-shadow:0 3px 5px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.2);transition:transform .3s ease-in-out;
      overflow:clip;
    }
    .ep-theme-toggle .ep-cont-icon .ep-icon-inner { width:1rem;fill:var(--light);filter:drop-shadow(0 0 2px rgba(255,255,255,.5)); }
    .ep-theme-toggle.ep-checked .ep-toggle-label { border-color:#60a5fa; }
    .ep-theme-toggle.ep-checked .ep-toggle-label::before { color:#60a5fa; text-shadow:0 0 5px rgba(96,165,250,.5); }
    .ep-theme-toggle.ep-checked .ep-cont-icon {
      overflow:visible;
      background:linear-gradient(to bottom,#2563eb,#1d4ed8);
      border-color:#60a5fa;
      transform:translateX(calc((var(--gap) * 2) + 100%)) rotate(-225deg);
      box-shadow:0 0 10px rgba(96,165,250,.6), inset 0 1px 0 rgba(255,255,255,.3);
    }

    /* ── ep-alert: Spaceship Comm Channel (info-importants.html) ── */
    .ep-alert {
      border:1px solid;padding:1rem;border-radius:12px;
      display:flex;flex-direction:column;gap:.5rem;
      transition:all .3s ease-in-out;font-size:.875rem;font-weight:600;
      position:relative;background-image:linear-gradient(rgba(255,255,255,.015) 50%, rgba(0,0,0,.015) 50%), linear-gradient(90deg, rgba(255,255,255,.015) 50%, rgba(0,0,0,.015) 50%);
      background-size:4px 4px;box-shadow:inset 0 0 15px rgba(0,0,0,.15);
    }
    .ep-alert-header { display:flex;align-items:center;gap:.5rem;border-bottom:1px dashed currentColor;padding-bottom:.4rem;width:100%; }
    .ep-alert-tag { font-family:monospace;letter-spacing:.15em;font-size:.75rem;font-weight:900;text-transform:uppercase; }
    .ep-alert-body { font-size:.85rem;line-height:1.4;margin:0;font-weight:500; }
    .ep-alert:hover { transform:translateY(-2px); box-shadow:inset 0 0 10px rgba(0,0,0,.2), 0 5px 15px rgba(0,0,0,.05); }
    .ep-alert svg { width:16px;height:16px;flex-shrink:0; }
    .ep-alert--success { background-color:rgba(16,185,129,.05);border-color:rgba(16,185,129,.3);color:#065f46; }
    .ep-alert--info { background-color:rgba(59,130,246,.05);border-color:rgba(59,130,246,.3);color:#1e40af; }
    .ep-alert--warning { background-color:rgba(245,158,11,.05);border-color:rgba(245,158,11,.3);color:#78350f; }
    .ep-alert--error { background-color:rgba(239,68,68,.05);border-color:rgba(239,68,68,.3);color:#991b1b; }
    .dark .ep-alert--success { background-color:rgba(16,185,129,.1);border-color:#10b981;color:#34d399;text-shadow:0 0 5px rgba(52,211,153,.3); }
    .dark .ep-alert--info { background-color:rgba(59,130,246,.1);border-color:#3b82f6;color:#60a5fa;text-shadow:0 0 5px rgba(96,165,250,.3); }
    .dark .ep-alert--warning { background-color:rgba(245,158,11,.1);border-color:#f59e0b;color:#fbbf24;text-shadow:0 0 5px rgba(251,191,36,.3); }
    .dark .ep-alert--error { background-color:rgba(239,68,68,.1);border-color:#ef4444;color:#fca5a5;text-shadow:0 0 5px rgba(252,165,165,.3); }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .ep-shine-btn::before, .ep-shine-btn:hover::before { animation: none !important; }
      .ep-star-btn .ep-s1,.ep-star-btn .ep-s2,.ep-star-btn .ep-s3,
      .ep-star-btn .ep-s4,.ep-star-btn .ep-s5,.ep-star-btn .ep-s6 { transition: none !important; }
      .ep-earth-loader svg { animation: none !important; }
      .ep-planet-wrap .ep-planet, .ep-planet-wrap .ep-planet .ep-ring { animation: none !important; }
      .ep-skeleton .ep-sk-bar::before, .ep-skeleton .ep-sk-progress .ep-sk-flow { animation: none !important; }
      .ep-ticket .ep-t-main::after { animation: none !important; }
      .ep-tx:hover .ep-tx-card, .ep-tx:hover .ep-tx-dollar { animation: none !important; }
    }
  </style>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    // Lucide React UMD expects lowercase 'react' global
    window.react = window.React;
  </script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>

  <!-- GSAP & ScrollTrigger -->
  <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence, useMotionValue, useTransform, useSpring } = window.Motion;
    const { ChevronRight, Star, Play, Award, Zap, BookOpen, FlaskConical, Trophy, User, ArrowRight, CheckCircle2, XCircle, Gamepad2, Brain, Compass, Users, Sparkles, Code, Globe, Shield, Lock, Plus, Trash2, Check, Sun, Moon, Heart } = window.LucideReact;

    // ═══ UI COMPONENT WRAPPERS ═══

    // Shine CTA Button — used on Hero CTAs and key actions
    const ShineButton = ({ children, onClick, className = '' }) => (
      <button className={`ep-shine-btn ${className}`} onClick={onClick}>
        {children}
        <svg className="ep-shine-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    );

    // Star Explosion Button — used as "Play" action on game cards
    const StarExplosionBtn = ({ children, onClick, className = '' }) => {
      const starSvg = <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 784.11 815.53"><path className="ep-fil0" d="M392.05 0c-20.9 210.08-184.06 378.41-392.05 407.78 207.96 29.37 371.12 197.68 392.05 407.74 20.93-210.06 184.09-378.37 392.05-407.74-207.98-29.38-371.13-197.69-392.05-407.78z"/></svg>;
      return (
        <button className={`ep-star-btn ${className}`} onClick={onClick}>
          {children}
          <div className="ep-s1">{starSvg}</div>
          <div className="ep-s2">{starSvg}</div>
          <div className="ep-s3">{starSvg}</div>
          <div className="ep-s4">{starSvg}</div>
          <div className="ep-s5">{starSvg}</div>
          <div className="ep-s6">{starSvg}</div>
        </button>
      );
    };

    // Favourite Toggle — adds star-favourite to game cards
    const FavouriteToggle = ({ id, className = '' }) => {
      const [checked, setChecked] = useState(() => {
        try { return JSON.parse(localStorage.getItem(`ep_fav_${id}`)) || false; } catch { return false; }
      });
      const toggle = (e) => {
        e.stopPropagation();
        const next = !checked;
        setChecked(next);
        localStorage.setItem(`ep_fav_${id}`, JSON.stringify(next));
      };
      return (
        <label className={`ep-fav ${className}`} onClick={toggle}>
          <input type="checkbox" checked={checked} readOnly />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </label>
      );
    };

    // Star Rating — post-quiz rating component
    const StarRatingInput = ({ onRate, className = '' }) => {
      const [value, setValue] = useState(0);
      const handleRate = (v) => { setValue(v); if (onRate) onRate(v); };
      return (
        <div className={`ep-rating ${className}`}>
          {[5,4,3,2,1].map(v => (
            <React.Fragment key={v}>
              <input type="radio" id={`ep-star-${v}`} name="ep-rating" checked={value === v} onChange={() => handleRate(v)} />
              <label htmlFor={`ep-star-${v}`}>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </label>
            </React.Fragment>
          ))}
        </div>
      );
    };

    // Skeleton Loader — glassmorphic upload card skeleton
    const SkeletonLoader = ({ className = '' }) => (
      <div className={`ep-skeleton ${className}`}>
        <div className="ep-sk-head">
          <div className="ep-sk-icon"></div>
          <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
            <div className="ep-sk-bar ep-sk-title"></div>
            <div className="ep-sk-bar ep-sk-sub"></div>
          </div>
          <div className="ep-sk-pill">Cargando...</div>
        </div>
        <div className="ep-sk-mid">
          <div className="ep-sk-bar ep-sk-wide"></div>
          <div className="ep-sk-bar ep-sk-short"></div>
          <div className="ep-sk-bar ep-sk-wide"></div>
        </div>
        <div className="ep-sk-progress">
          <div className="ep-sk-flow"></div>
        </div>
      </div>
    );

    // Earth Globe Loader — used during quiz loading
    const EarthLoader = ({ className = '' }) => {
      const land = <svg fill="#7cc133" viewBox="0 0 100 50"><ellipse cx="50" cy="25" rx="40" ry="22"/></svg>;
      return (
        <div className={`ep-earth-loader ${className}`}>
          {land}{land}{land}{land}
        </div>
      );
    };

    // Planet Orbital Loader — page transitions
    const PlanetLoader = ({ text = 'Cargando', className = '' }) => (
      <div className={`ep-planet-wrap ${className}`}>
        <div className="ep-planet">
          <div className="ep-ring"></div>
          <div className="ep-cover-ring"></div>
          <div className="ep-spots">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <p>{text}</p>
      </div>
    );

    // Ticket Profile Card — used in Dashboard profile section
    const TicketProfileCard = ({ user, className = '' }) => (
      <div className={`ep-ticket-wrap ${className}`}>
        <div className="ep-ticket">
          <div className="ep-t-main">
            <div className="ep-t-content">
              <div className="ep-t-header">
                <div className="ep-t-logo">
                  <Gamepad2 size={15} />
                  <span>EduPlay</span>
                </div>
                <span className="ep-t-type">Aventurero</span>
              </div>
              <div className="ep-t-title">{user.name}</div>
              <div className="ep-t-subtitle">Nivel {user.level} · {user.xp} XP</div>
              <div className="ep-t-details">
                <div><div className="ep-t-label">Racha</div><div className="ep-t-value">{user.streak} días</div></div>
                <div><div className="ep-t-label">Retos</div><div className="ep-t-value">{user.completedChallenges || 0}</div></div>
                <div><div className="ep-t-label">Insignias</div><div className="ep-t-value">{user.badges?.length || 0}</div></div>
                <div><div className="ep-t-label">Siguiente</div><div className="ep-t-value">Lvl {user.level + 1}</div></div>
              </div>
            </div>
          </div>
          <div className="ep-t-perf">
            <div style={{width:'1em',height:'1em',borderRadius:'50%',background:'var(--t-bg)',border:'2px solid rgba(255,255,255,.1)'}}></div>
            <div className="ep-t-perf-line"></div>
            <div style={{width:'1em',height:'1em',borderRadius:'50%',background:'var(--t-bg)',border:'2px solid rgba(255,255,255,.1)'}}></div>
          </div>
          <div className="ep-t-stub">
            <div>
              <div className="ep-t-barcode"></div>
              <div className="ep-t-barcode-id">EP-{String(user.level).padStart(3,'0')}-{user.xp}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div className="ep-t-admit-text">Nivel</div>
              <div className="ep-t-admit-num">{user.level}</div>
            </div>
          </div>
        </div>
      </div>
    );

    // Transaction Reward Card — XP gain animation
    const TransactionCard = ({ amount = '+50 XP', className = '' }) => (
      <div className={`ep-tx ${className}`} title="Núcleo de Energía XP">
        <div className="ep-tx-left">
          <div className="ep-tx-card">
            <div className="ep-tx-card-line"></div>
          </div>
          <span className="ep-tx-dollar">{amount}</span>
        </div>
        <div className="ep-tx-right">
          <span className="ep-tx-new">CRÉDITO XP</span>
          <ArrowRight size={16} style={{marginRight:'12px',color:'#10b981'}} />
        </div>
      </div>
    );

    // Alert Banners — notifications system
    const AlertBanner = ({ type = 'info', children, className = '' }) => {
      const titles = {
        success: 'MISIÓN CUMPLIDA',
        info: 'SISTEMA DE LA NAVE',
        warning: 'REPORTE DE SENSORES',
        error: 'ALERTA DE SISTEMA'
      };
      const icons = {
        success: <svg stroke="currentColor" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/></svg>,
        info: <svg stroke="currentColor" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 16h-1v-4h1m0-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/></svg>,
        warning: <svg stroke="currentColor" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/></svg>,
        error: <svg stroke="currentColor" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/></svg>,
      };
      return (
        <div className={`ep-alert ep-alert--${type} ${className}`}>
          <div className="ep-alert-header">
            {icons[type]}
            <span className="ep-alert-tag">{titles[type]}</span>
          </div>
          <p className="ep-alert-body">{children}</p>
        </div>
      );
    };

    // Premium Theme Toggle — replaces navbar toggle
    const PremiumThemeToggle = ({ isDark, onToggle }) => (
      <div className={`ep-theme-toggle ${isDark ? 'ep-checked' : ''}`} onClick={onToggle} title={isDark ? 'Modo día' : 'Modo noche'}>
        <input type="checkbox" className="ep-toggle-input" checked={isDark} readOnly />
        <label className="ep-toggle-label">
          <div className="ep-cont-icon">
            {isDark ? (
              <Sun size={14} className="ep-icon-inner" style={{fill:'var(--light)'}} />
            ) : (
              <Moon size={14} className="ep-icon-inner" style={{fill:'var(--light)'}} />
            )}
          </div>
        </label>
      </div>
    );

    // GitHub Star Button — footer element
    const GitHubStarButton = ({ className = '' }) => (
      <a
        href="#"
        className={`inline-flex overflow-hidden items-center text-sm font-medium bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 shadow hover:bg-zinc-800 dark:hover:bg-zinc-100 h-9 px-4 py-2 max-w-52 whitespace-pre group relative w-fit justify-center gap-2 rounded-xl transition-all duration-300 ease-out hover:ring-2 hover:ring-zinc-900 dark:hover:ring-zinc-300 hover:ring-offset-2 ${className}`}
      >

      }

    const InkReveal = ({
      mouseX,
      mouseY,
      active,
      maskColor = [252, 250, 248],
      brushSize = 128,
      lifetime = 600,
      rStart = 10,
      rVary = 0.45,
      stampStep = 10,
      maxStamps = 200,
      segments = 36,
      wobble = [0.14, 0.08, 0.05],
      gradientInnerRadius = 0.2,
      gradientStops = [0.95, 0.88, 0],
      className = "",
      style = {},
    }) => {
      const canvasRef = React.useRef(null);
      const stampsRef = React.useRef([]);
      const runningRef = React.useRef(false);
      const lastPosRef = React.useRef(null);
      const dimsRef = React.useRef({ w: 0, h: 0 });

      const mc = maskColor;

      const resize = React.useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const parent = canvas.parentElement;
        if (!parent) return;

        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const rect = parent.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        dimsRef.current = { w, h };
        canvas.width = Math.round(w * dpr);
        canvas.height = Math.round(h * dpr);
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = `rgb(${mc[0]},${mc[1]},${mc[2]})`;
        ctx.fillRect(0, 0, w, h);
      }, [mc]);

      const carveInk = React.useCallback(
        (ctx, x, y, r, seed, alpha) => {
          const g = ctx.createRadialGradient(
            x, y, r * gradientInnerRadius,
            x, y, r
          );
          g.addColorStop(0, `rgba(0,0,0,${gradientStops[0] * alpha})`);
          g.addColorStop(0.5, `rgba(0,0,0,${gradientStops[1] * alpha})`);
          g.addColorStop(1, `rgba(0,0,0,${gradientStops[2] * alpha})`);
          ctx.fillStyle = g;

          ctx.beginPath();
          for (let i = 0; i <= segments; i++) {
            const a = (i / segments) * Math.PI * 2;
            const wob =
              0.78 +
              wobble[0] * Math.sin(a * 3 + seed) +
              wobble[1] * Math.sin(a * 5 + seed * 2.1) +
              wobble[2] * Math.sin(a * 7 + seed * 0.7);
            const px = x + Math.cos(a) * r * wob;
            const py = y + Math.sin(a) * r * wob;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
        },
        [segments, wobble, gradientInnerRadius, gradientStops]
      );

      const addStamp = React.useCallback(
        (x, y) => {
          const stamps = stampsRef.current;
          if (stamps.length >= maxStamps) stamps.shift();
          stamps.push({
            x,
            y,
            born: performance.now(),
            seed: Math.random() * Math.PI * 2,
            rmax: brushSize * (1 - rVary + Math.random() * rVary),
          });
        },
        [brushSize, rVary, maxStamps]
      );

      const stampAlong = React.useCallback(
        (x, y) => {
          const last = lastPosRef.current;
          if (!last) {
            addStamp(x, y);
          } else {
            const dx = x - last.x;
            const dy = y - last.y;
            const dist = Math.hypot(dx, dy);
            const steps = Math.max(1, Math.ceil(dist / stampStep));
            for (let i = 1; i <= steps; i++) {
              addStamp(last.x + (dx * i) / steps, last.y + (dy * i) / steps);
            }
          }
          lastPosRef.current = { x, y };
        },
        [addStamp, stampStep]
      );

      const loop = React.useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;
        const { w, h } = dimsRef.current;
        const now = performance.now();
        const stamps = stampsRef.current;

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = `rgb(${mc[0]},${mc[1]},${mc[2]})`;
        ctx.fillRect(0, 0, w, h);
        ctx.globalCompositeOperation = "destination-out";

        for (let i = stamps.length - 1; i >= 0; i--) {
          const t = (now - stamps[i].born) / lifetime;
          if (t >= 1) {
            stamps.splice(i, 1);
            continue;
          }
          const ease = 1 - Math.pow(1 - t, 3);
          const r = rStart + (stamps[i].rmax - rStart) * ease;
          const alpha = 1 - t * t;
          carveInk(ctx, stamps[i].x, stamps[i].y, r, stamps[i].seed, alpha);
        }

        if (stamps.length) {
          requestAnimationFrame(loop);
        } else {
          runningRef.current = false;
        }
      }, [carveInk, mc, lifetime, rStart]);

      const startLoop = React.useCallback(() => {
        if (!runningRef.current) {
          runningRef.current = true;
          requestAnimationFrame(loop);
        }
      }, [loop]);

      useEffect(() => {
        resize();
        window.addEventListener("resize", resize);
        return () => window.removeEventListener("resize", resize);
      }, [resize]);

      useEffect(() => {
        if (active && mouseX !== null && mouseY !== null && mouseX !== undefined && mouseY !== undefined) {
          stampAlong(mouseX, mouseY);
          startLoop();
        } else {
          lastPosRef.current = null;
        }
      }, [mouseX, mouseY, active, stampAlong, startLoop]);

      return (
        <canvas
          ref={canvasRef}
          className={className}
          style={{
            position: "absolute",
            inset: 0,
            zIndex: 1,
            pointerEvents: "none",
            ...style,
          }}
        />
      );
    };

    const PremiumGameCard = ({ id, title, subject, level, duration, points, color, bg, icon: Icon, image, description, locked, tag, onClick, isDark }) => {

      const mY = useMotionValue(200);
      const mXSpring = useSpring(mX, { stiffness: 80, damping: 15 });
      const mYSpring = useSpring(mY, { stiffness: 80, damping: 15 });

      const mouseXSpring = useSpring(x);
      const mouseYSpring = useSpring(y);

      // Specular shine speculative angle & Tilt angle capped to max 15deg (was 7.5deg)
      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["15deg", "-15deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-15deg", "15deg"]);

      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const rawX = e.clientX - rect.left;
        const rawY = e.clientY - rect.top;
        
        mX.set(rawX);
        mY.set(rawY);
        setLocalMouse({ x: rawX, y: rawY });

        const xPct = rawX / width - 0.5;
        const yPct = rawY / height - 0.5;
        x.set(xPct);
        y.set(yPct);

        setIsHovered(true);
      };

        x.set(0);
        y.set(0);

            style={{
              background: `radial-gradient(circle 120px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.45) 0%, transparent 80%)`

          <div className="relative bg-white dark:bg-zinc-900 rounded-[1.8rem] h-full flex flex-col z-10 overflow-hidden">

    const QuizGame = ({ onNavigate, onAddXp }) => {

      const [status, setStatus] = useState('idle');
      const [score, setScore] = useState(0);
      const [xpAdded, setXpAdded] = useState(false);

      useEffect(() => {
        if (status === 'finished' && score > 0 && !xpAdded) {
          onAddXp(score);
          setXpAdded(true);
        }
      }, [status, score, xpAdded, onAddXp]);

      const q = MOCK_QUIZ.questions[currentQ];

      const handleSelect = (idx) => {
        if (status !== 'idle') return;
        setSelected(idx);
        if (idx === q.correct) {
          setStatus('correct');
          setScore(s => s + 50);
        } else {
          setStatus('incorrect');
        }
      };

      const handleNext = () => {
        if (currentQ < MOCK_QUIZ.questions.length - 1) {
          setCurrentQ(c => c + 1);
          setSelected(null);
          setStatus('idle');
        } else setStatus('finished');
      };

      if (status === 'finished') {

                  </button>

                  {checkoutStep === 'form' ? (
                    <div>
                      <div className="flex items-center gap-4 mb-6">
                        <div className="w-12 h-12 rounded-2xl bg-blue-50 dark:bg-blue-950/30 text-blue-600 dark:text-blue-400 flex items-center justify-center">
                          <Sparkles size={24} />
                        </div>
                        <div>
                          <h3 className="text-2xl font-black text-zinc-900 dark:text-white">Activar {checkoutPlan.name}</h3>
                          <p className="text-sm text-zinc-550 dark:text-zinc-400 font-medium">Prueba simulada de suscripción</p>
                        </div>
                      </div>

                      <form onSubmit={handleCheckoutSubmit} className="space-y-6">
                        <div>
                          <label htmlFor="checkout-email" className="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider mb-2">
                            Correo Electrónico
                          </label>
                          <input
                            id="checkout-email"
                            type="email"
                            required
                            autocomplete="email"
                            placeholder="ejemplo@correo.com"
                            value={email}
                            onChange={(e) => setEmail(e.target.value)}
                            className="w-full px-5 py-4 rounded-2xl border-2 border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-800 text-zinc-900 dark:text-white focus:border-blue-500 focus:outline-none font-medium transition-colors text-base"
                            disabled={loading}
                          />
                        </div>

                        <div className="p-5 rounded-2xl bg-zinc-50 dark:bg-zinc-850 border border-zinc-100 dark:border-zinc-800 space-y-2">
                          <div className="flex justify-between text-sm font-semibold">
                            <span className="text-zinc-500 dark:text-zinc-400">Plan:</span>
                            <span className="text-zinc-950 dark:text-white font-bold">{checkoutPlan.name}</span>
                          </div>
                          <div className="flex justify-between text-sm font-semibold">
                            <span className="text-zinc-500 dark:text-zinc-400">Precio:</span>
                            <span className="text-zinc-950 dark:text-white font-bold">${billingCycle === 'monthly' ? checkoutPlan.priceMonthly : checkoutPlan.priceAnnual} / mes</span>
                          </div>
                          <div className="w-full h-px bg-zinc-200/70 dark:bg-zinc-700 my-2" />
                          <p className="text-[11px] text-zinc-400 dark:text-zinc-500 leading-relaxed">
                            Esta es una pasarela de pago simulada. No se realizarán cargos reales a tu tarjeta de crédito o cuenta.
                          </p>
                        </div>

                        <div className="flex gap-4">
                          <Button
                            type="button"
                            variant="secondary"
                            onClick={() => setCheckoutPlan(null)}
                            className="flex-1 py-4"
                            disabled={loading}
                          >
                            Cancelar
                          </Button>
                          <Button
                            type="submit"
                            variant="primary"
                            className="flex-1 py-4 shadow-blue-500/20"
                            disabled={loading}
                          >
                            {loading ? 'Procesando...' : 'Confirmar'}
                          </Button>
                        </div>
                      </form>
                    </div>
                  ) : (
                    <div className="text-center py-6">
                      <div className="w-16 h-16 bg-green-150 dark:bg-green-950/30 rounded-full flex items-center justify-center mx-auto mb-6 text-green-600 dark:text-green-400">
                        <CheckCircle2 size={36} />
                      </div>
                      <h3 className="text-3xl font-black text-zinc-900 dark:text-white mb-2">¡Suscripción Activada!</h3>
                      <p className="text-zinc-550 dark:text-zinc-400 font-medium text-sm mb-8">
                        Felicidades, has activado tu membresía simulada para <strong className="text-zinc-800 dark:text-zinc-205">{checkoutPlan.name}</strong>. Disfruta de la mejor experiencia educativa.
                      </p>
                      <Button
                        variant="primary"
                        className="w-full py-4 text-base rounded-2xl"
                        onClick={() => { setCheckoutPlan(null); setCheckoutStep('form'); onNavigate('landing'); }}
                      >
                        Ir al Inicio
                      </Button>
                    </div>
                  )}
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    };

    const Navbar = ({ currentView, onNavigate, apiStatus, onOpenSettings, theme, onToggleTheme }) => {
      const [scrolled, setScrolled] = useState(false);
      
      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const navs = [
        { id: 'landing', label: 'Inicio' },
        { id: 'catalog', label: 'Juegos' },
        { id: 'pricing', label: 'Precios' },
        { id: 'dashboard', label: 'Mi Progreso' }
      ];

      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'py-3' : 'py-5'}`}>
          <div className="px-4 sm:px-6 lg:px-8">
            <div className={`max-w-7xl mx-auto flex justify-between items-center transition-all duration-500 rounded-full px-6 ${scrolled ? 'bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border border-zinc-200/50 dark:border-zinc-800 shadow-lg py-3' : 'bg-transparent py-2'}`}>
              <div className="flex items-center gap-3 cursor-pointer group" onClick={() => onNavigate('landing')}>
                <div className="w-12 h-12 bg-gradient-to-tr from-blue-600 to-cyan-500 rounded-[14px] flex items-center justify-center text-white shadow-lg shadow-blue-500/30 group-hover:scale-105 group-hover:rotate-3 transition-transform"><Gamepad2 size={24} /></div>
                <span className="font-black text-2xl tracking-tight text-zinc-900 dark:text-white hidden sm:block">EduPlay</span>
              </div>
              
              <div className="hidden md:flex items-center gap-2">
                {navs.map(nav => (
                  <button key={nav.id} onClick={() => onNavigate(nav.id)} className={`px-5 py-2.5 rounded-full text-sm font-bold transition-all ${currentView === nav.id ? 'bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 shadow-md' : 'text-zinc-550 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-100/80 dark:hover:bg-zinc-800'}`}>
                    {nav.label}
                  </button>
                ))}
              </div>
              
              <div className="flex items-center gap-4">
                {/* Indicador de Conexión de API */}
                <button 
                  onClick={onOpenSettings}
                  className="flex items-center gap-2 px-3 py-1.5 rounded-full border border-zinc-200/60 dark:border-zinc-800 bg-zinc-550/50 dark:bg-zinc-900/50 hover:bg-zinc-100/80 dark:hover:bg-zinc-800 text-zinc-650 dark:text-zinc-300 transition-all text-xs font-bold shadow-sm"
                  title="Configuración de API"
                >
                  <span className={`w-2.5 h-2.5 rounded-full ${apiStatus === 'connected' ? 'bg-green-500 animate-pulse' : apiStatus === 'connecting' ? 'bg-yellow-500 animate-pulse' : 'bg-red-450'}`} />
                  <span className="text-zinc-600 dark:text-zinc-300 hidden sm:inline">
                    {apiStatus === 'connected' ? 'API Conectada' : apiStatus === 'connecting' ? 'Conectando...' : 'API Desconectada'}
                  </span>
                </button>

                {/* Premium Theme Toggle */}
                <PremiumThemeToggle isDark={theme === 'dark'} onToggle={onToggleTheme} />

                <div className="hidden lg:flex items-center gap-2">
                  <button className="text-sm font-bold text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-100/85 dark:hover:bg-zinc-800 transition-colors px-3 py-2 rounded-lg" onClick={() => onNavigate('parents')}>Padres</button>
                  <button className="text-sm font-bold text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-100/85 dark:hover:bg-zinc-800 transition-colors px-3 py-2 rounded-lg" onClick={() => onNavigate('profile')}>Perfil</button>
                </div>
                <Button size="md" className="rounded-full shadow-lg shadow-blue-500/20 px-8" onClick={() => onNavigate('catalog')}>Jugar Ahora</Button>
            </div>
          </div>
        </div>
      </nav>
    );
  }

    const ModalWaitlistForm = ({ gameTitle, onFinish }) => {
      const [email, setEmail] = useState('');
      const [status, setStatus] = useState('idle');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!email) return;
        setStatus('loading');
        setTimeout(() => {
          setStatus('success');
          localStorage.setItem('eduplay_subscribed_email', email);
        }, 1000);
      };

      if (status === 'success') {
        return (
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="w-full space-y-4">
            <div className="p-4 bg-green-50 border border-green-200 rounded-2xl text-green-800 text-sm font-semibold flex items-center gap-3 justify-center">
              <CheckCircle2 size={18} className="text-green-500" />
              <span>¡Te has registrado con éxito!</span>
            </div>
            <Button variant="secondary" className="w-full py-3.5 rounded-xl font-bold" onClick={onFinish}>Entendido</Button>
          </motion.div>
        );
      }

      return (
        <form onSubmit={handleSubmit} className="w-full space-y-4">
          <div className="text-left">
            <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Regístrate para Acceso Anticipado</label>
            <input 
              type="email" 
              required
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="Ingresa tu email (papá o profesor)..." 
              className="w-full px-5 py-3.5 rounded-2xl border-2 border-zinc-200 focus:border-purple-500 focus:outline-none font-medium text-base"
              disabled={status === 'loading'}
            />
          </div>
          <div className="flex gap-3 w-full">
            <Button type="button" variant="secondary" className="flex-1 py-3.5 rounded-2xl" onClick={onFinish} disabled={status === 'loading'}>Cancelar</Button>
            <Button type="submit" className="flex-1 py-3.5 bg-purple-600 text-white rounded-2xl shadow-purple-500/20" disabled={status === 'loading'}>
              {status === 'loading' ? 'Registrando...' : 'Notificarme'}
            </Button>
          </div>
        </form>
      );
    };

    const App = () => {
      const [view, setView] = useState('landing');
      const [params, setParams] = useState({});
      const [lockedGame, setLockedGame] = useState(null);
      
      // Estado de Tema Día / Noche (Tema Día/Light es por defecto)
      const [theme, setTheme] = useState(() => {
        const saved = localStorage.getItem('eduplay_theme');
        return saved || 'light';
      });

      useEffect(() => {
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('eduplay_theme', theme);
      }, [theme]);

      // Estado del Usuario (Caché del navegador)
      const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('eduplay_user');
        if (saved) {
          try {
            return JSON.parse(saved);
          } catch (e) {
            console.error("Error al cargar perfil, reiniciando al invitado", e);
          }
        }
        return {
          name: "Aventurero",
          avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Aventurero&backgroundColor=ffdfbf",
          level: 1,
          xp: 0,
          nextLevelXp: 100,
          streak: 1,
          completedChallenges: 0,
          badges: [
            { id: 1, name: "Matemático Veloz", color: "text-yellow-500", bg: "bg-yellow-100" }
          ]
        };
      });

      const saveUser = (updatedUser) => {
        setUser(updatedUser);
        localStorage.setItem('eduplay_user', JSON.stringify(updatedUser));
      };

      const addXp = (amount) => {
        let newXp = user.xp + amount;
        let newLevel = user.level;
        let newNextLevelXp = user.nextLevelXp;

        while (newXp >= newNextLevelXp) {
          newXp -= newNextLevelXp;
          newLevel += 1;
          newNextLevelXp = newLevel * 200; // Incremento progresivo de XP requerida
        }

        let newBadges = [...(user.badges || [])];
        if (newLevel >= 2 && !newBadges.some(b => b.id === 4)) {
          newBadges.push({ id: 4, name: "Super Aprendiz", color: "text-purple-500", bg: "bg-purple-100" });
        }
        if (newLevel >= 5 && !newBadges.some(b => b.id === 5)) {
          newBadges.push({ id: 5, name: "Héroe Educativo", color: "text-amber-500", bg: "bg-amber-100" });
        }

        const updated = {
          ...user,
          xp: newXp,
          level: newLevel,
          nextLevelXp: newNextLevelXp,
          completedChallenges: (user.completedChallenges || 0) + 1,
          badges: newBadges
        };
        saveUser(updated);
      };

      // Estado de la API
      const [apiUrl, setApiUrl] = useState(() => localStorage.getItem('eduplay_api_url') || '');
      const [inputUrl, setInputUrl] = useState(() => localStorage.getItem('eduplay_api_url') || '');
      const [apiStatus, setApiStatus] = useState('disconnected'); // 'disconnected' | 'connecting' | 'connected'
      const [games, setGames] = useState(MOCK_GAMES);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);

      const navigate = (newView, newParams = {}) => {
        setParams(newParams);
        setView(newView);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // Función para conectar y cargar juegos de la API
      const loadApiGames = async (urlToTest) => {
        if (!urlToTest) {
          setGames(MOCK_GAMES);
          setApiStatus('disconnected');
          return false;
        }

        setApiStatus('connecting');
        
        // Limpiar URL y agregar protocolo si falta
        let cleanUrl = urlToTest.trim();
        if (!/^https?:\/\//i.test(cleanUrl)) {
          cleanUrl = 'http://' + cleanUrl;
        }

        try {
          // Remover diagonal final si la tiene
          cleanUrl = cleanUrl.replace(/\/$/, "");
          
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 5000); // 5s timeout

          const res = await fetch(`${cleanUrl}/juegos`, { 
            mode: 'cors',
            headers: {
              "ngrok-skip-browser-warning": "true"
            },
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);

          if (!res.ok) throw new Error("Error en respuesta del servidor");
          const text = await res.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch {
            data = parseApiResponsePayload(text);
          }
          if (!Array.isArray(data)) throw new Error("Formato de datos inesperado");

          const apiGamesMapped = data.map((g, index) => {
            const title = g.titulo || g.title || `Juego ${index + 1}`;
            const normalizedTitle = title.toLowerCase();
            const subject = normalizedTitle.includes('matem') ? 'Matemáticas'
              : normalizedTitle.includes('letras') ? 'Lectura'
              : normalizedTitle.includes('ciencia') || normalizedTitle.includes('explorador') ? 'Ciencias'
              : 'General';
            const icon = normalizedTitle.includes('matem') ? Zap
              : normalizedTitle.includes('letras') ? BookOpen
              : normalizedTitle.includes('ciencia') || normalizedTitle.includes('explorador') ? FlaskConical
              : Shield;

            return {
              id: `api-${g.id ?? index}`,
              title,
              subject,
              level: 'Todas',
              duration: g.duracion || '5 min',
              points: g.puntos ?? 100,
              color: subject === 'Matemáticas' ? 'from-blue-500 to-cyan-400' : subject === 'Lectura' ? 'from-red-500 to-pink-400' : 'from-green-500 to-emerald-400',
              bg: subject === 'Matemáticas' ? 'bg-blue-50' : subject === 'Lectura' ? 'bg-red-50' : 'bg-green-50',
              icon,
              image: g.imagen || g.image,
              description: g.descripcion || g.description || 'Explora este juego educativo.',
              isApi: true
            };
          });

          setGames([...apiGamesMapped, ...MOCK_GAMES]);
          setApiStatus('connected');
          return true;
        } catch (err) {
          console.error("Error al conectar con la API:", err);
          setGames(MOCK_GAMES);
          setApiStatus('disconnected');
          return false;
        }
      };

      // Intentar cargar al iniciar si hay una URL guardada
      useEffect(() => {
        if (apiUrl) {
          loadApiGames(apiUrl);
        }
      }, [apiUrl]);

      const handleTestConnection = async () => {
        await loadApiGames(inputUrl);
      };

      const handleSaveSettings = async () => {
        const success = await loadApiGames(inputUrl);
        localStorage.setItem('eduplay_api_url', inputUrl.trim());
        setApiUrl(inputUrl.trim());
        setIsSettingsOpen(false);
      };

      const views = {
        landing: <Landing onNavigate={navigate} onLockClick={setLockedGame} games={games} theme={theme} />,
        catalog: <Catalog onNavigate={navigate} onLockClick={setLockedGame} games={games} theme={theme} />,
        dashboard: <Dashboard onNavigate={navigate} user={user} />,
        game: <QuizGame onNavigate={navigate} onAddXp={addXp} gameId={params.gameId} />,
        parents: <ParentsPanel onNavigate={navigate} />,
        profile: <ProfilePanel onNavigate={navigate} user={user} onSaveUser={saveUser} />,
        pricing: <PricingPanel onNavigate={navigate} />
      };

      return (
        <div className="w-full min-h-screen relative font-sans text-zinc-900 dark:text-white selection:bg-blue-200 dark:selection:bg-blue-800">
          <Navbar 
            currentView={view} 
            onNavigate={navigate} 
            apiStatus={apiStatus} 
            theme={theme}
            onToggleTheme={() => setTheme(prev => prev === 'dark' ? 'light' : 'dark')}
            onOpenSettings={() => {
              setInputUrl(apiUrl);
              setIsSettingsOpen(true);
            }} 
          />
          
          <AnimatePresence mode="wait">
            <motion.div key={view} initial={{ opacity: 0, filter: 'blur(10px)' }} animate={{ opacity: 1, filter: 'blur(0px)' }} exit={{ opacity: 0, filter: 'blur(10px)' }} transition={{ duration: 0.4 }}>
              {views[view]}
            </motion.div>
          </AnimatePresence>

          {/* Modal de Configuración de API */}
          <AnimatePresence>
            {isSettingsOpen && (
              <motion.div 
                initial={{ opacity: 0 }} 
                animate={{ opacity: 1 }} 
                exit={{ opacity: 0 }} 
                className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-md"
                style={{ zIndex: 100 }}
              >
                <motion.div 
                  initial={{ scale: 0.95, y: 20 }} 
                  animate={{ scale: 1, y: 0 }} 
                  exit={{ scale: 0.95, y: 20 }}
                  transition={{ type: "spring", damping: 25, stiffness: 350 }}
                  className="bg-white rounded-[2.5rem] border border-zinc-100 p-8 md:p-10 w-full max-w-lg shadow-2xl relative"
                >
                  <button 
                    onClick={() => setIsSettingsOpen(false)} 
                    className="absolute top-6 right-6 w-10 h-10 rounded-full bg-zinc-100 hover:bg-zinc-200 text-zinc-500 flex items-center justify-center transition-colors"
                  >
                    <XCircle size={20} />
                  </button>

                  <div className="flex items-center gap-4 mb-6">
                    <div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center">
                      <Globe size={24} />
                    </div>
                    <div>
                      <h3 className="text-2xl font-black text-zinc-900">Configuración de API</h3>
                      <p className="text-sm text-zinc-500 font-medium">Conecta el portal con el servidor FastAPI local</p>
                    </div>
                  </div>

                  <div className="space-y-6">
                    <div>
                      <label className="block text-sm font-bold text-zinc-700 mb-2">URL del Túnel Ngrok / Localhost</label>
                      <div className="relative">
                        <input 
                          type="text" 
                          value={inputUrl} 
                          onChange={(e) => setInputUrl(e.target.value)}
                          placeholder="https://xxxx-xxxx.ngrok-free.app" 
                          className="w-full px-5 py-4 rounded-2xl border-2 border-zinc-200 focus:border-blue-500 focus:outline-none font-medium transition-colors text-base"
                        />
                      </div>
                      <p className="text-xs text-zinc-400 mt-2 font-medium">Pega la URL pública generada por Ngrok (ej: `ngrok http 8000`).</p>
                    </div>

                    {/* Detalles de Estado de Conexión */}
                    <div className="p-5 rounded-2xl bg-zinc-50 border border-zinc-100">
                      <div className="flex items-center justify-between mb-3">
                        <span className="text-sm font-bold text-zinc-500">Estado de Conexión:</span>
                        <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-black uppercase tracking-wider ${apiStatus === 'connected' ? 'bg-green-100 text-green-700' : apiStatus === 'connecting' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>
                          {apiStatus === 'connected' ? 'Conectado' : apiStatus === 'connecting' ? 'Probando...' : 'Desconectado'}
                        </span>
                      </div>
                      <p className="text-xs text-zinc-500 leading-relaxed font-medium">
                        {apiStatus === 'connected' 
                          ? '¡Excelente! Los juegos de la API han sido cargados e integrados al catálogo con éxito.' 
                          : apiStatus === 'connecting' 
                          ? 'Intentando contactar al servidor...' 
                          : 'Utilizando juegos locales (MOCK_GAMES) como respaldo por defecto.'}
                      </p>
                    </div>

                    <div className="flex gap-4">
                      <Button 
                        variant="secondary" 
                        onClick={handleTestConnection}
                        className="flex-1 py-4"
                        disabled={apiStatus === 'connecting'}
                      >
                        Probar Conexión
                      </Button>
                      <Button 
                        variant="primary" 
                        onClick={handleSaveSettings}
                        className="flex-1 py-4 shadow-blue-500/20"
                        disabled={apiStatus === 'connecting'}
                      >
                        Guardar y Cerrar
                      </Button>
                    </div>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Modal de Juego Bloqueado / Waitlist */}
          <AnimatePresence>
            {lockedGame && (
              <motion.div 
                initial={{ opacity: 0 }} 
                animate={{ opacity: 1 }} 
                exit={{ opacity: 0 }} 
                className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-md"
                style={{ zIndex: 110 }}
              >
                <motion.div 
                  initial={{ scale: 0.95, y: 20 }} 
                  animate={{ scale: 1, y: 0 }} 
                  exit={{ scale: 0.95, y: 20 }}
                  className="bg-white rounded-[2.5rem] border border-zinc-100 p-8 md:p-10 w-full max-w-lg shadow-2xl relative overflow-hidden"
                >
                  <div className="absolute top-0 right-0 w-40 h-40 bg-gradient-to-bl from-blue-500/10 to-purple-500/10 rounded-full blur-[40px] -z-0"></div>
                  
                  <button 
                    onClick={() => setLockedGame(null)} 
                    className="absolute top-6 right-6 w-10 h-10 rounded-full bg-zinc-100 hover:bg-zinc-200 text-zinc-500 flex items-center justify-center transition-colors"
                  >
                    <XCircle size={20} />
                  </button>

                  <div className="flex flex-col items-center text-center relative z-10">
                    <div className="w-16 h-16 rounded-2xl bg-purple-50 text-purple-600 flex items-center justify-center mb-6">
                      <Lock size={32} />
                    </div>
                    
                    <h3 className="text-3xl font-black text-zinc-900 mb-2">¡Próximamente en EduPlay Pro!</h3>
                    <p className="text-zinc-600 font-medium text-base mb-6">
                      El juego <strong className="text-zinc-950 font-bold">"{lockedGame.title}"</strong> y más de 30 aventuras interactivas avanzadas estarán disponibles muy pronto en nuestra versión completa.
                    </p>

                    <ModalWaitlistForm gameTitle={lockedGame.title} onFinish={() => setLockedGame(null)} />
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
